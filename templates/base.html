<!DOCTYPE html>
<html>
<head>
    <title>College Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark shadow-sm">
    <span class="navbar-brand ms-3">
        <i class="bi bi-mortarboard-fill"></i> College Management System
    </span>

    <div class="me-3 d-flex align-items-center">
        <span class="user-name me-3">
            <i class="bi bi-person-circle"></i> {{ session["user"] }}
        </span>

        <a href="/logout" class="btn btn-light logout-btn">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-5">
    <div class="main-card">
        {% block content %}{% endblock %}
    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 College Management System | Developed by Himesh Dusi</p>
</footer>

</body>
</html>
