{% extends "base.html" %}
{% block content %}



<!-- HEADER -->
<div class="page-header">
    <h2>✏️ Edit Student Details</h2>
    <p class="text-muted">Update student information below</p>
</div>

<!-- FORM -->
<form method="POST" class="edit-card">

    <!-- Roll No (readonly) -->
    <div class="input-group">
        <input type="text" value="{{ s.roll_no }}" readonly class="readonly-field">
        <label>Roll Number</label>
    </div>

    <!-- Name -->
    <div class="input-group">
        <input type="text" name="name" value="{{ s.name }}" required>
        <label>Name</label>
    </div>

    <!-- Year -->
    <div class="input-group">
        <input type="text" name="year" value="{{ s.year }}">
        <label>Year</label>
    </div>

    <!-- Grade -->
    <div class="input-group">
        <input type="text" name="grade" value="{{ s.grade }}">
        <label>Grade</label>
    </div>

    <!-- Backlogs -->
    <div class="input-group">
        <input type="number" name="backlogs" value="{{ s.backlogs }}">
        <label>Backlogs</label>
    </div>

    <!-- Email -->
    <div class="input-group">
        <input type="email" name="email" value="{{ s.email }}">
        <label>Email</label>
    </div>

    <!-- Phone -->
    <div class="input-group">
        <input type="text" name="phone" value="{{ s.phone }}">
        <label>Phone</label>
    </div>

    <button class="update-btn mt-3">Update Student</button>

</form>

{% endblock %}
